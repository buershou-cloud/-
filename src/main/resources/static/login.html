<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台登录 - 支付平台管理</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #071631;
      --muted: #71819a;
      --line: #d9e2ef;
      --primary: #1677ff;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    .login-card {
      width: min(520px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.14);
      overflow: hidden;
    }

    .login-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px;
      border-bottom: 1px solid var(--line);
    }

    .logo {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
    }

    .login-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    form {
      padding: 24px;
    }

    label {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      color: #29384f;
      font-size: 13px;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }

    .verify-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #29384f;
      font-size: 13px;
      font-weight: 800;
    }

    .verify-box {
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f8fbff;
    }

    .verify-actions {
      display: inline-flex;
      gap: 8px;
    }

    .verify-icon {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.16);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      text-shadow: 0 1px 2px rgba(15, 23, 42, 0.36);
    }

    .puzzle-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1;
      min-height: 180px;
      overflow: hidden;
      border-radius: 4px;
      background: #e7eef8;
      user-select: none;
    }

    .verify-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .verify-piece {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 8px 10px rgba(15, 23, 42, 0.24));
      pointer-events: none;
      will-change: left, top, width, height;
    }

    .stage-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: inline-flex;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(8px);
    }

    .verify-track {
      position: relative;
      height: 48px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8fafc;
      color: #172554;
      font-size: 16px;
      font-weight: 700;
      overflow: hidden;
      display: flex;
      touch-action: none;
      user-select: none;
    }

    .verify-track::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--verify-progress, 0px);
      background: rgba(22, 119, 255, 0.12);
      transition: background 0.2s ease;
    }

    .verify-track.verified {
      border-color: rgba(34, 197, 94, 0.5);
      color: #15803d;
    }

    .verify-track.verified::before {
      background: rgba(34, 197, 94, 0.13);
    }

    .verify-handle {
      position: absolute;
      left: 0;
      top: -1px;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 62px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: #64748b;
      font-size: 30px;
      font-weight: 900;
      cursor: grab;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
      touch-action: none;
      will-change: transform;
    }

    .verify-handle:active {
      cursor: grabbing;
    }

    .verify-text {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    #verifySlider {
      position: absolute;
      width: 1px;
      height: 1px;
      min-height: 1px;
      padding: 0;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 7px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .message {
      min-height: 22px;
      margin-bottom: 14px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="login-head">
      <div class="logo">管</div>
      <div>
        <h1>支付平台管理</h1>
        <div class="login-sub">请输入后台账号密码</div>
      </div>
    </div>
    <form id="loginForm">
      <div id="message" class="message"></div>
      <label>账号
        <input id="username" name="username" autocomplete="username" value="admin" required>
      </label>
      <label>密码
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入登录密码" required>
      </label>
      <div class="verify-box">
        <div class="verify-head">
          <span>图形验证</span>
        </div>
        <div id="puzzleStage" class="puzzle-stage">
          <img id="verifyImage" class="verify-image" alt="图形验证">
          <img id="verifyPiece" class="verify-piece" alt="">
          <div class="stage-actions">
            <button class="verify-icon" type="button" title="拖动下方滑块，让拼图块对准缺口">?</button>
            <button id="refreshVerify" class="verify-icon" type="button" title="换一张">↻</button>
          </div>
        </div>
        <div id="verifyTrack" class="verify-track">
          <button id="verifyHandle" class="verify-handle" type="button" aria-label="拖动滑块">→</button>
          <span id="verifyText" class="verify-text">向右拖动滑块填充拼图</span>
          <input id="verifySlider" type="range" min="16" max="400" value="16" aria-label="图形验证滑块">
        </div>
      </div>
      <button id="loginButton" class="btn" type="submit">登录后台</button>
    </form>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let challenge = null;
    let sliderState = {
      minX: 16,
      maxX: 400,
      imageWidth: 480,
      pieceSize: 64,
      pieceY: 82,
      value: 16
    };
    let dragging = false;
    let dragStartClientX = 0;
    let dragStartValue = 0;

    async function request(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json; charset=utf-8" },
        ...options
      });
      const text = await response.text();
      let data = text;
      try {
        data = text ? JSON.parse(text) : {};
      } catch (ignored) {
        data = text;
      }
      if (!response.ok) {
        throw data;
      }
      return data;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setSliderValue(value, moved = false) {
      const track = $("verifyTrack");
      const handle = $("verifyHandle");
      const stage = $("puzzleStage");
      const slider = $("verifySlider");
      const piece = $("verifyPiece");
      const min = Number(sliderState.minX);
      const max = Number(sliderState.maxX);
      const next = clamp(Number(value), min, max);
      const ratio = max === min ? 0 : (next - min) / (max - min);
      const trackTravel = Math.max(0, track.clientWidth - handle.offsetWidth);
      const handleX = ratio * trackTravel;
      const stageScale = stage.clientWidth / Number(sliderState.imageWidth || 480);
      const pieceSize = Number(sliderState.pieceSize || 64) * stageScale;
      const pieceX = next * stageScale;
      const pieceY = Number(sliderState.pieceY || 82) * stageScale;

      sliderState.value = next;
      slider.value = Math.round(next);
      handle.style.transform = `translateX(${handleX}px)`;
      track.style.setProperty("--verify-progress", `${handleX + handle.offsetWidth}px`);
      piece.style.left = `${pieceX}px`;
      piece.style.top = `${pieceY}px`;
      piece.style.width = `${pieceSize}px`;
      piece.style.height = `${pieceSize}px`;

      if (moved && next > min + 2) {
        track.classList.add("verified");
        $("verifyText").textContent = "已拖动，点击登录完成验证";
      } else {
        track.classList.remove("verified");
        $("verifyText").textContent = "向右拖动滑块填充拼图";
      }
    }

    function sliderValueFromPointer(event) {
      const track = $("verifyTrack");
      const handle = $("verifyHandle");
      const rect = track.getBoundingClientRect();
      const trackTravel = Math.max(1, track.clientWidth - handle.offsetWidth);
      const handleX = clamp(event.clientX - rect.left - handle.offsetWidth / 2, 0, trackTravel);
      const ratio = handleX / trackTravel;
      return sliderState.minX + ratio * (sliderState.maxX - sliderState.minX);
    }

    async function loadChallenge() {
      challenge = await request("/api/v1/admin-auth/graphic-challenge");
      $("verifyImage").src = challenge.image;
      $("verifyPiece").src = challenge.pieceImage || "";
      $("verifySlider").min = challenge.minX;
      $("verifySlider").max = challenge.maxX;
      sliderState = {
        minX: Number(challenge.minX),
        maxX: Number(challenge.maxX),
        imageWidth: Number(challenge.width || 480),
        pieceSize: Number(challenge.pieceSize || 64),
        pieceY: Number(challenge.pieceY || 82),
        value: Number(challenge.minX)
      };
      requestAnimationFrame(() => setSliderValue(sliderState.minX));
    }

    request("/api/v1/admin-auth/session")
      .then((session) => {
        if (session.authenticated) {
          window.location.replace("/");
        }
      })
      .catch(() => {})
      .finally(() => loadChallenge().catch(() => {
        $("message").textContent = "图形验证加载失败，请刷新页面";
      }));

    $("refreshVerify").addEventListener("click", () => {
      $("message").textContent = "";
      loadChallenge().catch(() => {
        $("message").textContent = "图形验证加载失败，请刷新页面";
      });
    });

    $("verifyHandle").addEventListener("pointerdown", (event) => {
      dragging = true;
      dragStartClientX = event.clientX;
      dragStartValue = sliderState.value;
      event.preventDefault();
    });

    $("verifyTrack").addEventListener("pointerdown", (event) => {
      if (event.target === $("verifyHandle")) {
        return;
      }
      setSliderValue(sliderValueFromPointer(event), true);
      dragging = true;
      dragStartClientX = event.clientX;
      dragStartValue = sliderState.value;
      event.preventDefault();
    });

    window.addEventListener("pointermove", (event) => {
      if (!dragging) {
        return;
      }
      const track = $("verifyTrack");
      const handle = $("verifyHandle");
      const trackTravel = Math.max(1, track.clientWidth - handle.offsetWidth);
      const delta = (event.clientX - dragStartClientX) / trackTravel * (sliderState.maxX - sliderState.minX);
      setSliderValue(dragStartValue + delta, true);
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
    });

    $("verifySlider").addEventListener("input", () => {
      setSliderValue(Number($("verifySlider").value), true);
    });

    window.addEventListener("resize", () => {
      setSliderValue(sliderState.value, sliderState.value > sliderState.minX + 2);
    });

    $("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      $("message").textContent = "";
      $("loginButton").disabled = true;
      try {
        if (!challenge) {
          throw { message: "请先完成图形验证" };
        }
        await request("/api/v1/admin-auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: $("username").value.trim(),
            password: $("password").value,
            verificationId: challenge.challengeId,
            verificationX: Number($("verifySlider").value)
          })
        });
        window.location.replace("/");
      } catch (error) {
        $("message").textContent = error.message || "登录失败，请检查账号密码";
        await loadChallenge().catch(() => {});
      } finally {
        $("loginButton").disabled = false;
      }
    });
  </script>
</body>
</html>
