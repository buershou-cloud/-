<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="origin">
  <title>正在打开抖音支付</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #0f172a;
      background: #f4f7fb;
      font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { text-align: center; }
    .spinner {
      width: 36px;
      height: 36px;
      margin: 0 auto 16px;
      border: 3px solid #dbeafe;
      border-top-color: #1677ff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .error { color: #dc2626; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <div id="message">正在打开抖音支付...</div>
  </main>
  <script>
    (() => {
      const message = document.getElementById("message");
      const rawTarget = new URLSearchParams(location.search).get("target");
      let target;
      try {
        target = new URL(rawTarget || "");
      } catch (error) {
        message.className = "error";
        message.textContent = "支付链接无效，请返回收银台重新发起支付。";
        return;
      }

      const host = target.hostname.toLowerCase();
      const trustedHost = host === "cashier.ulpay.com"
        || host.endsWith(".ulpay.com")
        || host === "douyinpay.com"
        || host.endsWith(".douyinpay.com");
      if (target.protocol !== "https:" || !trustedHost) {
        message.className = "error";
        message.textContent = "支付链接来源不受信任，请返回收银台重新发起支付。";
        return;
      }

      history.replaceState(null, "", "/douyin-h5-launch.html");
      window.location.replace(target.toString());
    })();
  </script>
</body>
</html>
