<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通道收银台</title>
  <style>
    :root {
      --primary: #1677ff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe3ef;
      --bg: #f3f6fb;
      --green: #38b000;
      --red: #ff4d4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .shell {
      width: min(520px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-weight: 900;
      font-size: 20px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 22px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .head {
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
    }

    .head h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 15px;
      padding: 22px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }

    .amount {
      height: 58px;
      font-size: 26px;
      letter-spacing: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .payment-code-panel {
      display: grid;
      gap: 10px;
    }

    .payment-code-panel[hidden] {
      display: none !important;
    }

    .payment-code-actions {
      display: grid;
      gap: 8px;
    }

    .payment-code-upload {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid rgba(22, 119, 255, 0.28);
      border-radius: 8px;
      background: #eef6ff;
      color: var(--primary);
      padding: 0 14px;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .payment-code-upload:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .payment-code-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
    }

    .payment-code-status.ok {
      color: var(--green);
    }

    .payment-code-status.bad {
      color: var(--red);
    }

    .payment-code-status.loading {
      color: var(--primary);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 22px 22px;
    }

    .mini {
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #f8fbff;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .mini strong {
      display: block;
      margin-top: 7px;
      overflow-wrap: anywhere;
      font-size: 15px;
    }

    .result {
      display: none;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
      color: #dbeafe;
      padding: 14px;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message {
      margin: 16px 0 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
      color: var(--muted);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.55;
    }

    .message.ok {
      border-color: rgba(56, 176, 0, 0.25);
      background: #f3ffe9;
      color: var(--green);
    }

    .message.bad {
      border-color: rgba(255, 77, 79, 0.25);
      background: #fff2f0;
      color: var(--red);
    }

    .message.loading {
      border-color: rgba(22, 119, 255, 0.25);
      background: #eef6ff;
      color: var(--primary);
    }

    .pay-panel {
      display: none;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 18px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .continue-panel {
      display: none;
      margin-top: 16px;
      border: 1px solid rgba(22, 119, 255, 0.22);
      border-radius: 10px;
      background: #f8fbff;
      padding: 16px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .continue-panel.active {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .continue-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.6;
    }

    .continue-button {
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      padding: 12px 18px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .payment-form-holder {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .pay-panel.active {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .pay-panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .pay-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .pay-qr {
      width: 260px;
      max-width: 100%;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    .ok {
      color: var(--green);
    }

    .bad {
      color: var(--red);
    }
  </style>
</head>
<body>
<main class="shell">
  <div class="brand"><div class="logo">¥</div><div>通道收银台</div></div>
  <section class="card">
    <div class="head">
      <h1 id="cashierTitle">收银台</h1>
      <p id="cashierHint">输入金额后发起支付，订单将固定走当前二维码对应的支付通道。</p>
    </div>
    <form id="cashierForm">
      <label>支付金额
        <input id="amount" class="amount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
      </label>
      <label>订单标题
        <input id="subject" value="扫码收银台支付" required>
      </label>
      <div id="paymentCodePanel" class="payment-code-panel" hidden>
        <label>付款码数字
          <input id="paymentCode" inputmode="numeric" pattern="[0-9]*" placeholder="可手动输入，也可上传照片自动识别">
        </label>
        <div class="payment-code-actions">
          <input id="paymentCodeFile" type="file" accept="image/*" hidden>
          <button id="paymentCodeUploadButton" class="payment-code-upload" type="button">上传照片识别付款码</button>
          <div id="paymentCodeUploadStatus" class="payment-code-status">只在付款码产品中使用，其他支付产品不会显示。</div>
        </div>
      </div>
      <button id="payButton" class="btn" type="submit" disabled>确认支付</button>
    </form>
    <div class="meta">
      <div class="mini"><span>支付通道</span><strong id="channelText">-</strong></div>
      <div class="mini"><span>通道类型</span><strong id="providerText">-</strong></div>
    </div>
  </section>
  <div id="message" class="message">请输入金额后确认支付。</div>
  <section id="continuePanel" class="continue-panel" aria-live="polite">
    <p>如果没有自动打开支付宝，请点击按钮继续付款。</p>
    <button id="continuePayButton" class="continue-button" type="button">打开支付宝付款</button>
  </section>
  <section id="payPanel" class="pay-panel" aria-live="polite">
    <h2 id="payPanelTitle">支付宝付款二维码</h2>
    <img id="payQrImage" class="pay-qr" alt="支付宝付款二维码">
    <p id="payPanelHint">请使用支付宝扫码付款，付款完成后返回商户页面查看订单状态。</p>
  </section>
  <pre id="result" class="result">等待输入金额...</pre>
  <div id="paymentFormHolder" class="payment-form-holder"></div>
</main>

<script>
  const params = new URLSearchParams(location.search);
  const oauthState = oauthStateParams(params.get("state"));
  const channelId = params.get("channelId");
  const merchantId = params.get("merchantId");
  const preferredProduct = paramValue("product");
  const oauthAuthCode = params.get("auth_code") || params.get("authCode");
  const autoPayRequested = paramValue("autoPay") === "1";
  const normalizedChannelId = safeDecode(paramValue("channelId"));
  const normalizedMerchantId = safeDecode(paramValue("merchantId"));
  const productLabels = {
    ALIPAY_ORDER_CODE: "订单码",
    ALIPAY_F2F: "当面付",
    ALIPAY_PAYMENT_CODE: "付款码",
    ALIPAY_APP: "APP支付",
    ALIPAY_WAP: "WAP手机",
    ALIPAY_PAGE: "PC网页",
    ALIPAY_JSAPI: "JSAPI",
    ALIPAY_PREAUTH: "线下预授权",
    ALIPAY_PREAUTH_H5: "H5预授权",
    ALIPAY_DIRECT_WAP: "直付通WAP手机",
    ALIPAY_DIRECT_F2F: "直付通当面付",
    ALIPAY_DIRECT_APP: "直付通APP支付",
    ALIPAY_DIRECT_PAGE: "直付通PC网页",
    ALIPAY_DIRECT_ORDER_CODE: "直付通订单码",
    ALIPAY_DIRECT_JSAPI: "直付通JSAPI",
    DOUYIN_H5: "抖音H5支付",
    DOUYIN_NATIVE: "抖音Native支付"
  };
  const desktopProductPreference = [
    "ALIPAY_ORDER_CODE",
    "ALIPAY_DIRECT_ORDER_CODE",
    "ALIPAY_PAYMENT_CODE",
    "ALIPAY_F2F",
    "ALIPAY_DIRECT_F2F",
    "ALIPAY_PREAUTH",
    "ALIPAY_PREAUTH_H5",
    "ALIPAY_APP",
    "ALIPAY_DIRECT_APP",
    "ALIPAY_WAP",
    "ALIPAY_DIRECT_WAP",
    "ALIPAY_PAGE",
    "ALIPAY_DIRECT_PAGE",
    "ALIPAY_JSAPI",
    "ALIPAY_DIRECT_JSAPI",
    "DOUYIN_NATIVE",
    "DOUYIN_H5"
  ];
  const mobileProductPreference = [
    ...desktopProductPreference.filter((product) => product !== "DOUYIN_NATIVE" && product !== "DOUYIN_H5"),
    "DOUYIN_H5",
    "DOUYIN_NATIVE"
  ];

  let currentChannel;
  let currentMerchant;
  let currentAvailableChannels = [];
  let currentProduct;
  let currentProductOptions = [];
  let alipaySubmitForm;
  let paymentPollTimer;
  let paymentPollAttempts = 0;

  const $ = (id) => document.getElementById(id);

  function isMobilePayClient() {
    return /AlipayClient|Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
  }

  function isAlipayClient() {
    return /AlipayClient/i.test(navigator.userAgent || "");
  }

  function safeDecode(value) {
    if (!value) return value;
    let decoded = value;
    for (let index = 0; index < 2; index += 1) {
      try {
        const next = decodeURIComponent(decoded);
        if (next === decoded) break;
        decoded = next;
      } catch (error) {
        break;
      }
    }
    return decoded;
  }

  function oauthStateParams(rawState) {
    try {
      return new URLSearchParams(rawState || "");
    } catch (error) {
      return new URLSearchParams();
    }
  }

  function paramValue(key) {
    return params.get(key) || oauthState.get(key);
  }

  function tokenVariants(value) {
    const raw = String(value || "").trim();
    if (!raw) return [];
    const decoded = safeDecode(raw);
    const values = [raw, decoded, encodeURIComponent(raw), encodeURIComponent(decoded)];
    return [...new Set(values.map((item) => item.toLowerCase()))];
  }

  function tokenMatches(left, right) {
    const leftSet = new Set(tokenVariants(left));
    return tokenVariants(right).some((item) => leftSet.has(item));
  }

  function channelMatches(channel, value) {
    if (!channel || !value) return false;
    return [channel.id, channel.name, channel.appId, channel.provider].some((token) => tokenMatches(token, value));
  }

    function messageText(value) {
      if (typeof value === "string") return value;
      if (!value || typeof value !== "object") return String(value || "");
      if (value.orderString) {
        return `${value.message || "APP支付订单信息已生成"}\n\norderString:\n${value.orderString}`;
      }
      const text = value.message || value.subMessage || value.error || value.code || JSON.stringify(value);
      const authAttempts = authAttemptsText(value);
      if (authAttempts) return `${text}\n\n${authAttempts}`;
      const attempts = gatewayAttemptsText(value);
      return attempts ? `${text}\n\n${attempts}` : text;
    }

    function authAttemptsText(value) {
      if (!Array.isArray(value?.attempts) || !value.attempts.length || !value.attempts.some((attempt) => attempt?.options)) {
        return "";
      }
      const lines = value.attempts.map((attempt, index) => {
        const options = JSON.stringify(attempt.options || {});
        const result = attempt.result || {};
        const error = result.errorMessage || result.errorMessageKey || result.error || result.resultCode || JSON.stringify(result);
        return `${index + 1}. ${options}: ${error || "无返回"}`;
      });
      return `授权尝试:\n${lines.join("\n")}`;
    }

    function gatewayAttemptsText(value) {
      if (!Array.isArray(value?.attempts) || !value.attempts.length) return "";
      const lines = value.attempts.map((attempt) => {
        const status = attempt.success ? "成功" : "失败";
        const code = attempt.code ? ` ${attempt.code}` : "";
        const message = attempt.message ? ` ${attempt.message}` : "";
        return `${attempt.channelId || "-"} ${status}${code}${message}`;
      });
      return `通道尝试:\n${lines.join("\n")}`;
    }

  function setMessage(value, tone = "") {
    const message = $("message");
    message.hidden = false;
    message.textContent = messageText(value);
    message.className = `message${tone ? ` ${tone}` : ""}`;
  }

  function writeResult(value, tone = "") {
    $("result").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    if (tone === "ok") {
      $("message").hidden = true;
      return;
    }
    setMessage(value, tone);
  }

  function setPaymentCodeUploadStatus(text, tone = "") {
    const status = $("paymentCodeUploadStatus");
    status.textContent = text;
    status.className = `payment-code-status${tone ? ` ${tone}` : ""}`;
  }

  function clearPaymentCodeUi() {
    $("paymentCode").value = "";
    $("paymentCodeFile").value = "";
    setPaymentCodeUploadStatus("只在付款码产品中使用，其他支付产品不会显示。");
  }

  function normalizePaymentCode(value) {
    const compact = String(value || "").replace(/\s+/g, "");
    const direct = compact.match(/^\d{10,32}$/);
    if (direct) return compact;
    const query = String(value || "").match(/(?:auth_code|authCode|payment_code|paymentCode|code)=([0-9]{10,32})/i);
    if (query) return query[1];
    const digits = String(value || "").match(/(?:^|\D)(\d{10,32})(?!\d)/);
    return digits ? digits[1] : "";
  }

  function maskPaymentCode(code) {
    if (!code || code.length <= 8) return code || "";
    return `${code.slice(0, 4)}****${code.slice(-4)}`;
  }

  function hidePaymentQr() {
    $("payPanel").classList.remove("active");
    $("payQrImage").removeAttribute("src");
  }

  function hideContinuePanel() {
    $("continuePanel").classList.remove("active");
    alipaySubmitForm = null;
    $("paymentFormHolder").innerHTML = "";
  }

  function clearPaymentPolling() {
    if (paymentPollTimer) {
      clearTimeout(paymentPollTimer);
      paymentPollTimer = null;
    }
    paymentPollAttempts = 0;
  }

  function submitAlipayForm() {
    if (!alipaySubmitForm) {
      return false;
    }
    alipaySubmitForm.submit();
    return true;
  }

  function showPaymentQr(text, title, hint) {
    $("payPanelTitle").textContent = title;
    $("payPanelHint").textContent = hint;
    $("payQrImage").src = `/api/v1/qrcode?text=${encodeURIComponent(text)}&t=${Date.now()}`;
    $("payPanel").classList.add("active");
  }

  function alipayStartAppUrl(text) {
    if (/^alipays?:\/\//i.test(text)) {
      return text;
    }
    return `alipays://platformapi/startapp?appId=20000067&url=${encodeURIComponent(text)}`;
  }

  function openAlipayQr(text, message = "正在打开支付宝付款...") {
    writeResult(message, "loading");
    if (/^alipays?:\/\//i.test(text)) {
      window.location.href = text;
      return;
    }
    if (/AlipayClient/i.test(navigator.userAgent || "")) {
      window.location.href = text;
      return;
    }
    window.location.href = alipayStartAppUrl(text);
  }

  function openAlipayNativePay(text, message = "正在打开支付宝付款...") {
    writeResult(message, "loading");
    if (/AlipayClient/i.test(navigator.userAgent || "")) {
      startAlipayH5App(text);
      return;
    }
    window.location.href = alipayStartAppUrl(text);
  }

  function startAlipayH5App(url) {
    let fallbackTimer;
    const fallback = () => {
      window.location.href = alipayStartAppUrl(url);
    };
    const callStartApp = () => {
      try {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        fallbackTimer = setTimeout(fallback, 800);
        window.AlipayJSBridge.call("startApp", {
          appId: "20000067",
          param: {
            url,
            appClearTop: false,
            startMultApp: "YES"
          }
        }, (result) => {
          if (fallbackTimer) clearTimeout(fallbackTimer);
          if (result && result.error) {
            fallback();
          }
        });
      } catch (error) {
        fallback();
      }
    };
    if (window.AlipayJSBridge) {
      callStartApp();
      return;
    }
    document.addEventListener("AlipayJSBridgeReady", callStartApp, { once: true });
    setTimeout(() => {
      if (!window.AlipayJSBridge) {
        fallback();
      }
    }, 1000);
  }

  function isOrderCodeProduct(product) {
    return product === "ALIPAY_ORDER_CODE" || product === "ALIPAY_DIRECT_ORDER_CODE";
  }

  function isQrPollingProduct(product) {
    return isOrderCodeProduct(product) || product === "DOUYIN_NATIVE";
  }

  function isPaymentCodeProduct(product) {
    return product === "ALIPAY_PAYMENT_CODE";
  }

  function isH5PreauthProduct(product) {
    return product === "ALIPAY_PREAUTH_H5";
  }

  function isPagePayProduct(product) {
    return product === "ALIPAY_PAGE" || product === "ALIPAY_DIRECT_PAGE";
  }

  function alipayFormActionUrl(form) {
    if (!form) {
      return "";
    }
    const action = form.getAttribute("action");
    if (!action) {
      return "";
    }
    const params = new URLSearchParams();
    form.querySelectorAll("input[name]").forEach((input) => {
      params.append(input.name, input.value || "");
    });
    const separator = action.includes("?") ? "&" : "?";
    return `${action}${separator}${params.toString()}`;
  }

  function responseBody(data) {
    const raw = data && data.raw;
    if (!raw || typeof raw !== "object") {
      return {};
    }
    const key = Object.keys(raw).find((item) => item.endsWith("_response"));
    return key && raw[key] && typeof raw[key] === "object" ? raw[key] : {};
  }

  function responseTradeStatus(data) {
    return responseBody(data).trade_status || "";
  }

  function paymentChannelId(data) {
    return data.channelId || (currentChannel && currentChannel.id) || "";
  }

  function appOrderString(data) {
    return data && data.raw && data.raw.order_string ? data.raw.order_string : "";
  }

  function appPayLaunchUrl(orderString) {
    return `alipays://platformapi/startapp?appId=20000125&orderSuffix=${encodeURIComponent(orderString)}`;
  }

  function jsapiTradeNo(data) {
    return data?.tradeNo || data?.trade_no || responseBody(data).trade_no || "";
  }

  function isPaymentComplete(data) {
    return data.status === "SUCCESS" || responseTradeStatus(data) === "TRADE_SUCCESS" || responseTradeStatus(data) === "TRADE_FINISHED";
  }

  function isPaymentClosed(data) {
    return data.status === "CLOSED" || responseTradeStatus(data) === "TRADE_CLOSED";
  }

  async function queryPaymentStatus(outTradeNo, channelId) {
    return request("/api/v1/payments/query", {
      method: "POST",
      body: JSON.stringify({
        outTradeNo,
        channelIds: channelId ? [channelId] : []
      })
    });
  }

  async function cancelPayment(outTradeNo, channelId) {
    return request("/api/v1/payments/cancel", {
      method: "POST",
      body: JSON.stringify({
        outTradeNo,
        channelIds: channelId ? [channelId] : []
      })
    });
  }

  function startOrderCodePolling(paymentResponse, payload) {
    clearPaymentPolling();
    if (!isQrPollingProduct(currentProduct) || !payload.outTradeNo) {
      return;
    }
    const channelId = paymentChannelId(paymentResponse);
    const maxAttempts = currentProduct === "DOUYIN_NATIVE" ? 24 : 120;
    const poll = async () => {
      paymentPollAttempts += 1;
      try {
        const data = await queryPaymentStatus(payload.outTradeNo, channelId);
        if (isPaymentComplete(data)) {
          clearPaymentPolling();
          hidePaymentQr();
          writeResult("支付成功，订单状态已同步。", "ok");
          return;
        }
        if (isPaymentClosed(data)) {
          clearPaymentPolling();
          hidePaymentQr();
          writeResult("订单已关闭，未完成付款。", "bad");
          return;
        }
        if (paymentPollAttempts >= maxAttempts) {
          const cancelResult = await cancelPayment(payload.outTradeNo, channelId);
          clearPaymentPolling();
          hidePaymentQr();
          writeResult(cancelResult.status === "CLOSED" ? "订单码超时未支付，已撤销订单。" : cancelResult, cancelResult.status === "CLOSED" ? "bad" : "loading");
          return;
        }
        paymentPollTimer = setTimeout(poll, 5000);
      } catch (error) {
        if (paymentPollAttempts >= maxAttempts) {
          clearPaymentPolling();
          writeResult(error, "bad");
          return;
        }
        paymentPollTimer = setTimeout(poll, 5000);
      }
    };
    paymentPollTimer = setTimeout(poll, 5000);
  }

  function startJsapiPaymentPolling(paymentResponse, payload) {
    clearPaymentPolling();
    if (!payload.outTradeNo) {
      return;

    const channelId = paymentChannelId(paymentResponse);

        paymentPollTimer = setTimeout(poll, 2000);

  function startAppPaymentPolling(paymentResponse, payload, paymentName = "APP支付") {
    clearPaymentPolling();
    if (!payload.outTradeNo) {

    const channelId = paymentChannelId(paymentResponse);

  async function request(url, options = {}) {
    const response = await fetch(url, {
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      ...options
    });
    const text = await response.text();
    const data = text ? JSON.parse(text) : {};
    if (!response.ok) throw data;
    return data;
  }

  async function decodePaymentCodePhoto(file) {
    const body = new FormData();
    body.append("file", file);
    const response = await fetch("/api/v1/payment-code/decode", {
      method: "POST",
      body
    });
    const text = await response.text();
    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch (error) {
      data = { message: text || "付款码照片识别失败" };
    }
    if (!response.ok) throw data;
    return data;
  }

  function productOptions(channel) {
    return (channel.products || [])
      .filter((product) => product !== "ALIPAY_DIRECT")
      .filter((product) => productLabels[product]);
  }

  function merchantChannels(merchant, channels) {
    const allowed = Array.isArray(merchant.channelIds) ? merchant.channelIds : [];
    return channels.filter((channel) => (
      channel.enabled !== false &&
      (!allowed.length || allowed.some((id) => channelMatches(channel, id)))
    ));
  }

  function merchantProduct(merchant, channels) {
    const products = new Set(merchantChannels(merchant, channels).flatMap(productOptions));
    if (preferredProduct) {
      if (products.has(preferredProduct)) {
        return preferredProduct;
      }
      throw { code: "PRODUCT_NOT_ENABLED", message: "二维码指定的支付产品未在当前商户可用通道中启用，请重新生成二维码。" };
    }
    return chooseProduct([...products]);
  }

  function chooseProduct(options) {
    const products = new Set(options || []);
    const preference = isMobilePayClient() ? mobileProductPreference : desktopProductPreference;
    return preference.find((product) => products.has(product));
  }

  function findChannel(channels, id) {
    return channels.find((channel) => channelMatches(channel, id));
  }

  function noProductMessage() {
    return "当前通道没有可用于收银台的支付产品，请在支付通道里至少勾选一个支付产品。";
  }

  function applyProductUi() {
    const paymentCodeMode = isPaymentCodeProduct(currentProduct);
    const paymentCodePanel = $("paymentCodePanel");
    const paymentCodeInput = $("paymentCode");
    const paymentCodeFile = $("paymentCodeFile");
    const paymentCodeUploadButton = $("paymentCodeUploadButton");
    paymentCodePanel.hidden = !paymentCodeMode;
    paymentCodePanel.style.display = paymentCodeMode ? "grid" : "none";
    paymentCodeInput.required = paymentCodeMode;
    paymentCodeInput.disabled = !paymentCodeMode;
    paymentCodeFile.disabled = !paymentCodeMode;
    paymentCodeUploadButton.disabled = !paymentCodeMode;
    if (!paymentCodeMode) {
      clearPaymentCodeUi();
      return;
    }
    setPaymentCodeUploadStatus("可手动输入付款码，也可以上传付款码照片自动识别。");
    $("cashierHint").textContent = "输入金额和顾客支付宝付款码后发起收款，本产品调用支付宝当面付付款码能力。";
  }

  function isJsapiProduct(product) {
    return product === "ALIPAY_JSAPI" || product === "ALIPAY_DIRECT_JSAPI";
  }

  function isDouyinH5Product(product) {
    return product === "DOUYIN_H5";
  }

  function isDouyinNativeProduct(product) {
    return product === "DOUYIN_NATIVE";
  }

  function channelsForCurrentProduct() {
    if (currentChannel) return [currentChannel];
    return currentAvailableChannels.filter((channel) => productOptions(channel).includes(currentProduct));
  }

  function oauthRedirectUrl() {
    return `${location.origin}${location.pathname}`;
  }

  function oauthStateValue() {
    const state = new URLSearchParams();
    if (normalizedChannelId) state.set("channelId", normalizedChannelId);
    if (normalizedMerchantId) state.set("merchantId", normalizedMerchantId);
    if (currentProduct) state.set("product", currentProduct);
    if ($("amount")?.value) state.set("amount", $("amount").value);
    if ($("subject")?.value) state.set("subject", $("subject").value);
    return state.toString();
  }

  function alipayOauthUrl(appId) {
    const url = new URL("https://openauth.alipay.com/oauth2/publicAppAuthorize.htm");
    url.searchParams.set("app_id", appId);
    url.searchParams.set("scope", "auth_base");
    url.searchParams.set("redirect_uri", oauthRedirectUrl());
    const state = oauthStateValue();
    if (state) url.searchParams.set("state", state);
    return url.toString();
  }

  function waitAlipayBridge(timeoutMs = 3000) {
    return new Promise((resolve, reject) => {
      if (window.AlipayJSBridge) {
        resolve(window.AlipayJSBridge);
        return;
      }
      const timer = window.setTimeout(() => {
        reject({ code: "ALIPAY_JSAPI_BRIDGE_TIMEOUT", message: "支付宝 JSBridge 未就绪，请确认页面是在支付宝内打开。" });
      }, timeoutMs);
      document.addEventListener("AlipayJSBridgeReady", () => {
        window.clearTimeout(timer);
        resolve(window.AlipayJSBridge);
      }, { once: true });
    });
  }

  async function getAlipayJsapiAuthCode(appId) {
    const bridge = await waitAlipayBridge();
    const attempts = [
      { appId, scopeNicks: ["auth_base"] },
      { appId, scopes: ["auth_base"] },
      { appId, scopeNicks: "auth_base" },
      { appId, scopes: "auth_base" }
    ];
    const failures = [];
    for (const options of attempts) {
      const result = await callAlipayGetAuthCode(bridge, options);
      const authCode = result?.authCode || result?.auth_code;
      if (authCode) {
        return authCode;
      }
      failures.push({ options, result });
    }
    const lastFailure = failures[failures.length - 1] || {};
    const lastResult = lastFailure.result || {};
    throw {
      code: "ALIPAY_JSAPI_GET_AUTH_CODE_FAILED",
      message: lastResult?.errorMessage || lastResult?.errorMessageKey || lastResult?.error || "支付宝授权码获取失败",
      raw: lastResult,
      attempts: failures
    };
  }

  function callAlipayGetAuthCode(bridge, options) {
    return new Promise((resolve) => {
      let settled = false;
      const finish = (result) => {
        if (settled) return;
        settled = true;
        resolve(result || {});
      };
      const timer = setTimeout(() => finish({
        error: "ALIPAY_JSAPI_AUTH_TIMEOUT",
        errorMessage: "支付宝授权码获取超时"
      }), 5000);
      bridge.call("getAuthCode", options, (result) => {
        clearTimeout(timer);
        finish(result);
      });
    });
  }

  function isInvalidBridgeParams(result) {
    const text = `${result?.error || ""} ${result?.errorMessage || ""} ${result?.errorMessageKey || ""}`;
    return /参数|invalid|INVALID|ILLEGAL|PARAM|REDIRECT_URI/i.test(text);
  }

  async function alipayJsapiTradePay(tradeNo) {
    const bridge = await waitAlipayBridge();
    const attempts = [
      { tradeNO: tradeNo },
      { tradeNo },
      { orderStr: tradeNo }
    ];
    let lastResult;
    for (const options of attempts) {
      const result = await callAlipayTradePay(bridge, options);
      lastResult = result;
      if (!isInvalidBridgeParams(result)) {
        return result;
      }
    }
    return lastResult || {};
  }

  async function alipayH5PreauthTradePay(orderString) {
    const bridge = await waitAlipayBridge();
    const attempts = [
      { orderStr: orderString },
      { orderString },
      { tradeNO: orderString }
    ];
    let lastResult;
    for (const options of attempts) {
      const result = await callAlipayTradePay(bridge, options);
      lastResult = result;
      if (!isInvalidBridgeParams(result)) {
        return result;
      }
    }
    return lastResult || {};
  }

  function callAlipayTradePay(bridge, options) {
    return new Promise((resolve) => {
      bridge.call("tradePay", options, (result) => resolve(result || {}));
    });
  }

  function tradePayResultCode(result) {
    return String(result?.resultCode || result?.result_code || result?.code || "");
  }

  function tradePayErrorMessage(result) {
    const code = tradePayResultCode(result);
    if (code === "6001") return "用户取消支付";
    if (code === "6002") return "网络连接异常，请稍后重试";
    if (code === "4000") return "支付宝支付失败";
    return result?.memo || result?.errorMessage || result?.error || "支付宝支付未完成";
  }

  function applyOauthStateDefaults() {
    if (oauthState.get("amount")) {
      $("amount").value = oauthState.get("amount");
    }
    if (oauthState.get("subject")) {
      $("subject").value = oauthState.get("subject");
    }
  }

  async function loadChannel() {
    const channels = await request("/api/v1/channels");
    if (normalizedChannelId) {
      currentChannel = findChannel(channels, normalizedChannelId);
      if (!currentChannel) {
        throw { code: "BAD_REQUEST", message: "支付通道不存在" };
      }
      currentAvailableChannels = [currentChannel];
      $("cashierTitle").textContent = `${currentChannel.id} 收银台`;
      $("channelText").textContent = currentChannel.id;
      $("providerText").textContent = currentChannel.provider === "DOUYIN"
        ? "抖音支付"
        : (currentChannel.provider === "ALIPAY_DIRECT" ? "支付宝直付通" : "支付宝官方产品");
      const options = productOptions(currentChannel);
      currentProductOptions = options;
      if (preferredProduct && !options.includes(preferredProduct)) {
        throw { code: "PRODUCT_NOT_ENABLED", message: "二维码指定的支付产品未在该通道启用，请在支付通道中重新保存并生成二维码。" };
      }
      currentProduct = preferredProduct || chooseProduct(options);
    } else if (normalizedMerchantId) {
      currentMerchant = await request(`/api/v1/merchants/${encodeURIComponent(normalizedMerchantId)}/cashier-info`);
      const availableChannels = merchantChannels(currentMerchant, channels);
      currentAvailableChannels = availableChannels;
      $("cashierTitle").textContent = `${currentMerchant.name} 收银台`;
      $("cashierHint").textContent = "输入金额后发起支付，订单将按商户可用支付通道自动路由。";
      $("subject").value = `${currentMerchant.name} 扫码收款`;
      $("channelText").textContent = availableChannels.map((channel) => channel.id).join("、") || "-";
      $("providerText").textContent = "商户收款码";
      currentProductOptions = [...new Set(availableChannels.flatMap(productOptions))];
      currentProduct = merchantProduct(currentMerchant, channels);
    } else {
      throw { code: "BAD_REQUEST", message: "缺少 channelId 或 merchantId" };
    }

    applyOauthStateDefaults();
    applyProductUi();
    if (!currentProduct) {
      $("payButton").disabled = true;
      writeResult({ code: "NO_PRODUCT", message: noProductMessage(), products: currentProductOptions }, "bad");
    } else {
      $("payButton").disabled = false;
      if (oauthAuthCode && isJsapiProduct(currentProduct)) {
        writeResult("支付宝授权已完成，请确认金额后再次点击确认支付。", "loading");
      } else if (autoPayRequested && isH5PreauthProduct(currentProduct) && isAlipayClient()) {
        writeResult("正在自动发起 H5 预授权...", "loading");
        setTimeout(() => $("cashierForm").requestSubmit(), 300);
      }
    }
  }

  function orderNo() {
    return `CASHIER${Date.now()}${Math.floor(Math.random() * 1000).toString().padStart(3, "0")}`;
  }

  $("paymentCodeUploadButton").addEventListener("click", () => {
    if (!isPaymentCodeProduct(currentProduct)) {
      clearPaymentCodeUi();
      return;
    }
    $("paymentCodeFile").click();
  });

  $("paymentCodeFile").addEventListener("change", async () => {
    if (!isPaymentCodeProduct(currentProduct)) {
      clearPaymentCodeUi();
      return;
    }
    const file = $("paymentCodeFile").files?.[0];
    if (!file) {
      return;
    }
    const uploadButton = $("paymentCodeUploadButton");
    uploadButton.disabled = true;
    setPaymentCodeUploadStatus("正在识别照片，请稍候...", "loading");
    try {
      const data = await decodePaymentCodePhoto(file);
      const paymentCode = normalizePaymentCode(data.paymentCode || data.text);
      if (!paymentCode) {
        throw {
          code: "PAYMENT_CODE_NOT_FOUND",
          message: "照片已识别，但没有找到付款码数字，请换一张更清晰的照片或手动输入。",
          raw: data
        };
      }
      $("paymentCode").value = paymentCode;
      setPaymentCodeUploadStatus(`已识别付款码 ${maskPaymentCode(paymentCode)}`, "ok");
      setMessage("付款码已识别，请确认金额后发起收款。", "loading");
    } catch (error) {
      $("paymentCodeFile").value = "";
      setPaymentCodeUploadStatus(messageText(error), "bad");
      setMessage(error, "bad");
    } finally {
      uploadButton.disabled = false;
    }
  });

  $("cashierForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    hidePaymentQr();
    hideContinuePanel();
    clearPaymentPolling();
    const payButton = $("payButton");
    const amount = Number($("amount").value);
    if (!amount || amount < 0.01) {
      writeResult({ code: "BAD_AMOUNT", message: "请输入正确金额" }, "bad");
      return;
    }
    const extra = { cashier: true };
    if (currentMerchant) {
      extra.merchantId = currentMerchant.merchantId;
      extra.merchantName = currentMerchant.name;
    }
    const payload = {
      product: currentProduct,
      outTradeNo: orderNo(),
      subject: $("subject").value,
      totalAmount: amount,
      timeoutExpress: "10m",
      extra
    };
    const backQuery = currentChannel
      ? `channelId=${encodeURIComponent(currentChannel.id)}`
      : `merchantId=${encodeURIComponent(currentMerchant.merchantId)}`;
    payload.returnUrl = `${location.origin}/cashier.html?${backQuery}`;
    payload.quitUrl = payload.returnUrl;
    if (isPagePayProduct(currentProduct) && isMobilePayClient()) {
      extra.integration_type = "ALIAPP";
      extra.request_from_url = payload.returnUrl;
    }
    if (currentChannel) {
      payload.channelIds = [currentChannel.id];
      payload.notifyUrl = currentChannel.provider === "DOUYIN"
        ? `${location.origin}/api/v1/douyin/notify/${encodeURIComponent(currentChannel.id)}`
        : `${location.origin}/api/v1/alipay/notify/${encodeURIComponent(currentChannel.id)}`;
    }
    if (isPaymentCodeProduct(currentProduct)) {
      const paymentCode = normalizePaymentCode($("paymentCode").value);
      if (!/^\d{10,32}$/.test(paymentCode)) {
        writeResult({ code: "BAD_PAYMENT_CODE", message: "请输入正确的支付宝付款码数字，或上传付款码照片自动识别。" }, "bad");
        return;
      }
      payload.authCode = paymentCode;
    }
    if (isJsapiProduct(currentProduct)) {
      const jsapiChannel = channelsForCurrentProduct()[0];
      if (jsapiChannel && !currentChannel) {
        payload.channelIds = [jsapiChannel.id];
      }
      if (oauthAuthCode) {
        payload.authCode = oauthAuthCode;
      } else if (isAlipayClient()) {
        if (!jsapiChannel?.appId) {
          writeResult({ code: "ALIPAY_JSAPI_APP_ID_MISSING", message: "JSAPI支付需要当前通道配置支付宝 app_id" }, "bad");
          return;
        }
        writeResult("正在跳转支付宝授权，授权完成后会返回收银台。", "loading");
        window.location.href = alipayOauthUrl(jsapiChannel.appId);
        return;
      } else {
        writeResult({
          code: "ALIPAY_JSAPI_AUTH_REQUIRED",
          message: "JSAPI支付需要在支付宝内打开并完成用户授权，或由接口传 buyerId、buyerOpenId、authCode。"
        }, "bad");
        return;
      }
    }
    payButton.disabled = true;
    writeResult("正在发起支付，请稍候...", "loading");
    try {
      const data = await request("/api/v1/payments/pay", {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const failed = data.status === "FAILED";
      writeResult(data.message || "支付请求已创建", failed ? "bad" : "ok");
      if (failed && !data.qrCode && !data.redirectUrl && !data.redirectHtml) {
        return;
      }
      if (isJsapiProduct(currentProduct)) {
        const tradeNo = jsapiTradeNo(data);
        if (!tradeNo) {
          writeResult({ code: "ALIPAY_JSAPI_TRADE_NO_MISSING", message: "支付宝 JSAPI 创建交易后未返回 trade_no", response: data }, "bad");
          return;
        }
        writeResult("正在调起支付宝付款...", "loading");
        const tradePayResult = await alipayJsapiTradePay(tradeNo);
        const resultCode = tradePayResultCode(tradePayResult);
        if (resultCode === "9000") {
          writeResult("支付成功，正在同步订单状态...", "loading");
          startJsapiPaymentPolling(data, payload);
          return;
        }
        if (resultCode === "8000") {
          writeResult("支付处理中，正在确认订单状态...", "loading");
          startJsapiPaymentPolling(data, payload);
          return;
        }
        writeResult({
          code: resultCode || "ALIPAY_JSAPI_TRADE_PAY_FAILED",
          message: tradePayErrorMessage(tradePayResult),
          raw: tradePayResult
        }, "bad");
        return;
      }
      if (isPaymentCodeProduct(currentProduct)) {
        if (data.status === "SUCCESS") {
          writeResult({ message: "付款码收款成功", response: data }, "ok");
          return;
        }
        if (data.status === "PENDING" || data.status === "PAYING") {
          writeResult({ message: "付款码支付处理中，请稍后到后台订单列表查询结果。", response: data }, "loading");
          return;
        }
        writeResult(data, failed ? "bad" : "ok");
        return;
      }
      const orderString = appOrderString(data);
      if (orderString) {
        if (isH5PreauthProduct(currentProduct)) {
          const h5PreauthUrl = appPayLaunchUrl(orderString);
          writeResult("正在唤起支付宝 H5 预授权...", "loading");
          if (!isAlipayClient()) {
            if (isMobilePayClient()) {
              openAlipayQr(h5PreauthUrl, "正在打开支付宝官方预授权页面...");
              return;
            }
            showPaymentQr(
              h5PreauthUrl,
              "H5预授权二维码",
              "请使用支付宝扫码确认预授权；本二维码会直接打开支付宝官方授权页。"
            );
            return;
          }
          const freezeResult = await alipayH5PreauthTradePay(orderString);
          const resultCode = tradePayResultCode(freezeResult);
          if (resultCode === "9000") {
            writeResult("预授权已提交，请稍后在后台订单列表查看冻结结果。", "ok");
            return;
          }
          if (resultCode === "8000") {
            writeResult("预授权处理中，请稍后在后台订单列表查看冻结结果。", "loading");
            return;
          }
          writeResult({
            code: resultCode || "ALIPAY_PREAUTH_H5_FAILED",
            message: tradePayErrorMessage(freezeResult),
            raw: freezeResult
          }, "bad");
          return;
        }
        const appPayUrl = appPayLaunchUrl(orderString);
        startAppPaymentPolling(data, payload);
        if (isMobilePayClient()) {
          openAlipayQr(appPayUrl, "正在打开支付宝 APP 支付...");
          return;
        }
        writeResult("已调用支付宝 APP 支付接口，请使用支付宝扫码付款。", "loading");
        showPaymentQr(
          appPayUrl,
          "APP支付二维码",
          "请使用支付宝扫码付款；本二维码由 alipay.trade.app.pay 返回的订单信息生成。"
        );
        return;
      }
      if (data.qrCode) {
        startOrderCodePolling(data, payload);
        if (isDouyinNativeProduct(currentProduct)) {
          writeResult("抖音Native支付订单已创建，请使用抖音扫码付款。", "loading");
          showPaymentQr(
            data.qrCode,
            "抖音付款二维码",
            "请使用抖音 App 的扫一扫完成付款；二维码有效期为两分钟。"
          );
          return;
        }
        if (isMobilePayClient()) {
          openAlipayQr(data.qrCode);
          return;
        }
        showPaymentQr(
          data.qrCode,
          "支付宝付款二维码",
          "请使用支付宝扫码付款，付款完成后订单会自动回调更新。"
        );
      } else if (data.redirectUrl) {
        if (isDouyinH5Product(currentProduct)) {
          startAppPaymentPolling(data, payload, "抖音H5支付");
          writeResult("抖音H5支付订单已创建，正在打开官方收银台...", "loading");
          if (isMobilePayClient()) {
            window.location.href = data.redirectUrl;
            return;
          }
          showPaymentQr(
            data.redirectUrl,
            "抖音H5支付二维码",
            "请使用手机扫码进入抖音支付官方H5收银台完成付款。"
          );
          return;
        }
        if (isMobilePayClient()) {
          openAlipayQr(data.redirectUrl);
          return;
        }
        showPaymentQr(
          data.redirectUrl,
          "支付宝付款二维码",
          "请使用手机支付宝扫码继续付款。"
        );
      } else if (data.redirectHtml) {
        writeResult("正在打开支付宝收银台...", "loading");
        const holder = $("paymentFormHolder");
        holder.innerHTML = data.redirectHtml;
        const form = holder.querySelector("form");
        if (form) {
          form.setAttribute("target", "_self");
          alipaySubmitForm = form;
          if (isMobilePayClient() && isPagePayProduct(currentProduct)) {
            const pagePayUrl = alipayFormActionUrl(form);
            if (pagePayUrl) {
              openAlipayNativePay(pagePayUrl, "正在打开支付宝电脑网站支付...");
              return;
            }
          }
          if (isMobilePayClient()) {
            setTimeout(() => submitAlipayForm(), 60);
            return;
          }
          $("continuePanel").classList.add("active");
          setTimeout(() => submitAlipayForm(), 60);
          return;
        }
        document.open();
        document.write(data.redirectHtml);
        document.close();
        return;
      }
    } catch (error) {
      writeResult(error, "bad");
    } finally {
      payButton.disabled = false;
    }
  });

  loadChannel().catch((error) => writeResult(error, "bad"));

  $("continuePayButton").addEventListener("click", () => {
    if (!submitAlipayForm()) {
      writeResult({ code: "PAY_FORM_EXPIRED", message: "支付表单已失效，请重新发起支付" }, "bad");
    }
  });
</script>
</body>
</html>
